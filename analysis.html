<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbiCore - Price Analysis & Tuning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #09090b; color: #fafafa; font-family: Inter, system-ui, sans-serif; }
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 18px; padding: 20px; margin-bottom: 24px; }
        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; border-bottom: 1px solid #27272a; padding-bottom: 12px; }
        select, button { background: #27272a; border: 1px solid #3f3f46; color: white; padding: 8px 16px; border-radius: 12px; cursor: pointer; }
        button:hover { background: #3f3f46; }
        .recommendation-box { background: #0f0f12; border-left: 4px solid; padding: 12px; border-radius: 12px; margin-bottom: 12px; }
        .error-text { color: #f87171; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">📊 Orderbook Analysis & Parameter Tuning</h1>
            <a href="/" class="text-blue-400 hover:underline">← Back to Dashboard</a>
        </div>

        <!-- Controls -->
        <div class="card">
            <div class="flex gap-4 items-end flex-wrap">
                <div>
                    <label class="block text-sm text-gray-400">Symbol</label>
                    <select id="symbol" class="mt-1"><option value="USDTIRT">USDT/IRT</option></select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400">Exchange</label>
                    <select id="exchange">
                        <option value="">All Exchanges</option>
                        <option value="wallex">Wallex</option>
                        <option value="nobitex">Nobitex</option>
                        <option value="bitpin">Bitpin</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400">Time Range</label>
                    <select id="hours">
                        <option value="24">Last 24h</option>
                        <option value="48">Last 48h</option>
                        <option value="72">Last 72h</option>
                        <option value="168">Last 7 days</option>
                        <option value="336">Last 14 days</option>
                    </select>
                </div>
                <div><button id="refreshBtn" class="bg-blue-600">Refresh</button></div>
            </div>
        </div>

        <!-- Charts -->
        <div class="card"><div class="card-title">📈 Spread History (%)</div><canvas id="spreadChart" height="100"></canvas></div>
        <div class="card"><div class="card-title">💰 Maximum Arbitrage Profit (Cross-Exchange)</div><canvas id="profitChart" height="100"></canvas></div>

        <!-- Volatility & Liquidity -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card"><div class="card-title">📉 Price Volatility</div><div id="volatilityStats" class="text-center text-2xl font-bold">--</div><div id="volatilityDetail" class="text-sm text-gray-400 mt-2"></div></div>
            <div class="card"><div class="card-title">💧 Liquidity Depth (Top 5 Levels)</div><div id="liquidityContainer"><p class="text-gray-400">Loading...</p></div></div>
        </div>

        <!-- Recommendations -->
        <div class="card"><div class="card-title">⚙️ Data-Driven Parameter Recommendations</div><div id="recommendations"><p class="text-gray-400">Analyzing your data...</p></div></div>
    </div>

    <script>
        const API_BASE = "/api/v1/arbitrage/analysis";
        let spreadChart = null, profitChart = null;

        async function fetchJSON(endpoint) {
            const res = await fetch(API_BASE + endpoint);
            if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
            return res.json();
        }

        async function loadSpreadHistory() {
            try {
                const symbol = document.getElementById("symbol").value;
                const exchange = document.getElementById("exchange").value;
                const hours = document.getElementById("hours").value;
                const data = await fetchJSON(`/spread-history?symbol=${symbol}&hours=${hours}&interval_minutes=10${exchange ? `&exchange=${exchange}` : ''}`);
                if (!data.length) throw new Error("No spread data");
                const labels = data.map(d => new Date(d.timestamp).toLocaleTimeString());
                const spreads = data.map(d => d.spread_percent);
                if (spreadChart) spreadChart.destroy();
                spreadChart = new Chart(document.getElementById('spreadChart'), { type: 'line', data: { labels, datasets: [{ label: 'Spread %', data: spreads, borderColor: '#facc15' }] } });
            } catch(e) { console.error(e); document.getElementById('spreadChart').getContext('2d').clearRect(0,0,800,400); }
        }

        async function loadProfitHistory() {
            try {
                const symbol = document.getElementById("symbol").value;
                const hours = document.getElementById("hours").value;
                const data = await fetchJSON(`/cross-exchange-spread?symbol=${symbol}&hours=${hours}`);
                if (!data.length) throw new Error("No profit data");
                const labels = data.map(d => new Date(d.timestamp).toLocaleTimeString());
                const profits = data.map(d => d.max_profit_percent);
                if (profitChart) profitChart.destroy();
                profitChart = new Chart(document.getElementById('profitChart'), { type: 'line', data: { labels, datasets: [{ label: 'Max Profit %', data: profits, borderColor: '#4ade80' }] } });
            } catch(e) { console.error(e); }
        }

        async function loadVolatility() {
            try {
                const symbol = document.getElementById("symbol").value;
                const exchange = document.getElementById("exchange").value;
                const hours = document.getElementById("hours").value;
                const data = await fetchJSON(`/volatility?symbol=${symbol}&hours=${hours}${exchange ? `&exchange=${exchange}` : ''}`);
                if (Object.keys(data).length === 0) throw new Error("No volatility data");
                document.getElementById("volatilityStats").innerHTML = `${data.volatility_percent}%`;
                document.getElementById("volatilityDetail").innerHTML = `Absolute: ${data.volatility_absolute} | Mean: ${data.mean_price}`;
            } catch(e) { document.getElementById("volatilityStats").innerHTML = "N/A"; }
        }

        async function loadLiquidity() {
            try {
                const symbol = document.getElementById("symbol").value;
                const exchange = document.getElementById("exchange").value;
                const hours = document.getElementById("hours").value;
                const data = await fetchJSON(`/liquidity-depth?symbol=${symbol}&hours=${hours}&depth_levels=5${exchange ? `&exchange=${exchange}` : ''}`);
                const container = document.getElementById("liquidityContainer");
                if (Object.keys(data).length === 0) { container.innerHTML = "<p class='text-gray-400'>No liquidity data</p>"; return; }
                let html = '<div class="space-y-4">';
                for (const [exch, depth] of Object.entries(data)) {
                    html += `<div><strong class="text-blue-400">${exch}</strong> <span class="text-xs text-gray-500">(${new Date(depth.timestamp).toLocaleString()})</span>`;
                    html += '<div class="grid grid-cols-2 gap-2 mt-2">';
                    html += '<div><div class="text-sm font-semibold">Ask Depth</div><ul class="text-xs">';
                    for (const ask of depth.asks) html += `<li>Lv${ask.level}: ${ask.price} (vol ${ask.volume_at_level}, cum ${ask.cumulative_volume})</li>`;
                    html += '</ul></div><div><div class="text-sm font-semibold">Bid Depth</div><ul class="text-xs">';
                    for (const bid of depth.bids) html += `<li>Lv${bid.level}: ${bid.price} (vol ${bid.volume_at_level}, cum ${bid.cumulative_volume})</li>`;
                    html += '</ul></div></div></div><hr class="border-gray-800 my-2"/>';
                }
                html += '</div>';
                container.innerHTML = html;
            } catch(e) { document.getElementById("liquidityContainer").innerHTML = "<p class='text-red-400'>Failed to load</p>"; }
        }

        async function loadRecommendations() {
            try {
                const symbol = document.getElementById("symbol").value;
                const hours = document.getElementById("hours").value;
                const exchange = document.getElementById("exchange").value || undefined;
                const [profitDist, spreadDist, imbalance, tradeSize, rebalanceLoss] = await Promise.all([
                    fetchJSON(`/profit-distribution?symbol=${symbol}&hours=${hours}`),
                    fetchJSON(`/spread-distribution?symbol=${symbol}&exchange=${exchange}&hours=${hours}`),
                    fetchJSON(`/imbalance-analysis?symbol=${symbol}&hours=${hours}`),
                    fetchJSON(`/trade-size-analysis?symbol=${symbol}&hours=${hours}`),
                    fetchJSON(`/rebalancing-loss-analysis?symbol=${symbol}&hours=${hours}`)
                ]);
                let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
                if (profitDist.percentiles) {
                    const p90 = profitDist.percentiles.p90;
                    const suggested = Math.max(0.5, (p90 / 2).toFixed(2));
                    html += `<div class="recommendation-box" style="border-left-color: #4ade80;"><div class="font-semibold text-green-400">💰 min_profit_percent</div><div>90th percentile profit: <strong>${p90}%</strong></div><div class="text-sm">Recommend: <code class="bg-black px-2 py-0.5 rounded">${suggested}%</code></div></div>`;
                }
                if (spreadDist.percentiles) {
                    const p90 = spreadDist.percentiles.p90;
                    const suggested = Math.min(0.5, p90).toFixed(2);
                    html += `<div class="recommendation-box" style="border-left-color: #facc15;"><div class="font-semibold text-yellow-400">📊 rebalance_max_spread_percent</div><div>90th percentile spread: <strong>${p90}%</strong></div><div class="text-sm">Recommend: <code class="bg-black px-2 py-0.5 rounded">${suggested}%</code></div></div>`;
                }
                if (imbalance.ratios_to_avg) {
                    const minRatio = Math.min(...Object.values(imbalance.ratios_to_avg));
                    const suggested = Math.max(0.1, (minRatio * 0.5).toFixed(2));
                    html += `<div class="recommendation-box" style="border-left-color: #60a5fa;"><div class="font-semibold text-blue-400">⚖️ rebalance_imbalance_ratio</div><div>Smallest balance ratio: <strong>${minRatio.toFixed(2)}</strong></div><div class="text-sm">Recommend: <code class="bg-black px-2 py-0.5 rounded">${suggested}</code></div></div>`;
                }
                if (tradeSize.median_traded_volume) {
                    html += `<div class="recommendation-box" style="border-left-color: #c084fc;"><div class="font-semibold text-purple-400">📈 min_trade_percent</div><div>Median traded volume: <strong>${tradeSize.median_traded_volume} USDT</strong></div><div class="text-sm">Recommend: <code class="bg-black px-2 py-0.5 rounded">0.1 - 0.2</code></div></div>`;
                }
                if (rebalanceLoss.avg_loss_per_rebalance) {
                    let note = Math.abs(rebalanceLoss.avg_loss_per_rebalance) > 100000 ? "⚠️ High losses – reduce amount to 5%" : (Math.abs(rebalanceLoss.avg_loss_per_rebalance) > 50000 ? "⚠️ Moderate losses" : "✅ Losses under control");
                    html += `<div class="recommendation-box" style="border-left-color: #f87171;"><div class="font-semibold text-red-400">🔄 Rebalancing Impact</div><div>Avg loss: ${Math.abs(rebalanceLoss.avg_loss_per_rebalance).toFixed(2)} IRT</div><div class="text-sm">${note}</div></div>`;
                }
                html += `</div>`;
                document.getElementById("recommendations").innerHTML = html;
            } catch(e) { document.getElementById("recommendations").innerHTML = `<p class="text-red-400">Error: ${e.message}</p>`; }
        }

        async function refreshAll() {
            await Promise.allSettled([loadSpreadHistory(), loadProfitHistory(), loadVolatility(), loadLiquidity(), loadRecommendations()]);
        }
        document.getElementById("refreshBtn").addEventListener("click", refreshAll);
        refreshAll();
        setInterval(refreshAll, 60000);
    </script>
</body>
</html>
